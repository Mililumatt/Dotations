function drawBackground(ctx, bgValue, width, height) {
  if (bgValue.startsWith("linear-gradient")) {
    const matches = bgValue.match(/#(?:[0-9a-fA-F]{3,8})/g) || [];
    const c1 = matches[0] || "#ffffff";
    const c2 = matches[1] || c1;
    const g = ctx.createLinearGradient(0, 0, 0, height);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = bgValue;
  }
  ctx.fillRect(0, 0, width, height);
}

async function svgToPngBlob(svgMarkup, width, height) {
  const svgBlob = new Blob([svgMarkup], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);
  try {
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = url;
    });
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, width, height);
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    return blob;
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function buildIcoBlobFromPng(pngBlob) {
  const pngBytes = new Uint8Array(await pngBlob.arrayBuffer());
  const pngView = new DataView(pngBytes.buffer, pngBytes.byteOffset, pngBytes.byteLength);
  const pngWidth = pngView.getUint32(16, false);
  const pngHeight = pngView.getUint32(20, false);
  const headerSize = 6;
  const dirEntrySize = 16;
  const offset = headerSize + dirEntrySize;
  const totalSize = offset + pngBytes.length;
  const out = new Uint8Array(totalSize);
  const view = new DataView(out.buffer);

  view.setUint16(0, 0, true);
  view.setUint16(2, 1, true);
  view.setUint16(4, 1, true);

  out[6] = pngWidth >= 256 ? 0 : pngWidth;
  out[7] = pngHeight >= 256 ? 0 : pngHeight;
  out[8] = 0;
  out[9] = 0;
  view.setUint16(10, 1, true);
  view.setUint16(12, 32, true);
  view.setUint32(14, pngBytes.length, true);
  view.setUint32(18, offset, true);

  out.set(pngBytes, offset);
  return new Blob([out], { type: "image/x-icon" });
}

function cloneWithInlineStyles(node) {
  const clone = node.cloneNode(false);
  const computed = window.getComputedStyle(node);
  let styleText = "";
  for (const prop of computed) {
    styleText += `${prop}:${computed.getPropertyValue(prop)};`;
  }
  clone.setAttribute("style", styleText);
  node.childNodes.forEach((child) => {
    if (child.nodeType === Node.ELEMENT_NODE) {
      clone.appendChild(cloneWithInlineStyles(child));
    } else if (child.nodeType === Node.TEXT_NODE) {
      clone.appendChild(document.createTextNode(child.textContent));
    }
  });
  return clone;
}

function drawRoundedRectPath(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

async function exportVariantFallbackPng(cardElement, variant, width, height) {
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");

  // Fond de carte exact
  const cardBg = window.getComputedStyle(cardElement).background;
  if (cardBg.includes("gradient")) {
    drawBackground(ctx, variant.bg, width, height);
  } else {
    ctx.fillStyle = window.getComputedStyle(cardElement).backgroundColor || "#ffffff";
    ctx.fillRect(0, 0, width, height);
  }

  // Bord arrondi
  const radius = parseFloat(window.getComputedStyle(cardElement).borderRadius || "10") || 10;
  const borderColor = window.getComputedStyle(cardElement).borderColor || "transparent";
  const borderWidth = parseFloat(window.getComputedStyle(cardElement).borderWidth || "0") || 0;
  if (borderWidth > 0 && borderColor !== "rgba(0, 0, 0, 0)") {
    drawRoundedRectPath(ctx, borderWidth / 2, borderWidth / 2, width - borderWidth, height - borderWidth, radius);
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = borderWidth;
    ctx.stroke();
  }

  const donutEl = cardElement.querySelector(".nexboard-donut");
  const nextEl = cardElement.querySelector(".nexboard-wordmark .next");
  const boardEl = cardElement.querySelector(".nexboard-wordmark .board");
  const ownerEl = cardElement.querySelector(".nexboard-info .owner");
  const copyEl = cardElement.querySelector(".nexboard-info .copy");
  const titreEl = cardElement.querySelector(".nexboard-info .titre");
  const sepEl = cardElement.querySelector(".nexboard-sep");

  const donutW = Math.round(donutEl?.getBoundingClientRect().width || 64);
  const donutH = Math.round(donutEl?.getBoundingClientRect().height || 80);
  const donutX = 14;
  const donutY = Math.round((height - donutH) / 2);

  const donutPng = await svgToPngBlob(getDonutSvgMarkup(variant.theme), donutW, donutH);
  const donutImg = await createImageBitmap(donutPng);
  ctx.drawImage(donutImg, donutX, donutY, donutW, donutH);

  const textX = donutX + donutW + 14;
  const wordY = Math.round(height * 0.45);
  const nextStyle = window.getComputedStyle(nextEl);
  const boardStyle = window.getComputedStyle(boardEl);
  const ownerStyle = window.getComputedStyle(ownerEl);
  const copyStyle = window.getComputedStyle(copyEl);
  const titreStyle = window.getComputedStyle(titreEl);

  ctx.font = `${nextStyle.fontWeight} ${nextStyle.fontSize} ${nextStyle.fontFamily}`;
  ctx.fillStyle = nextStyle.color;
  ctx.textBaseline = "alphabetic";
  ctx.fillText("Next", textX, wordY);
  const nextW = ctx.measureText("Next").width;

  ctx.font = `${boardStyle.fontWeight} ${boardStyle.fontSize} ${boardStyle.fontFamily}`;
  ctx.fillStyle = boardStyle.color;
  ctx.fillText("Bo@rd", textX + nextW, wordY);

  const sepY = wordY + 8;
  const sepColor = window.getComputedStyle(sepEl).backgroundColor || boardStyle.color;
  ctx.fillStyle = sepColor;
  ctx.fillRect(textX, sepY, Math.min(132, width - textX - 10), 3);

  const infoY = sepY + 18;
  ctx.font = `${ownerStyle.fontWeight} ${ownerStyle.fontSize} ${ownerStyle.fontFamily}`;
  ctx.fillStyle = ownerStyle.color;
  ctx.fillText("Sébastien DUC", textX, infoY);
  let offset = ctx.measureText("Sébastien DUC").width + 4;

  ctx.font = `${copyStyle.fontWeight} ${copyStyle.fontSize} ${copyStyle.fontFamily}`;
  ctx.fillStyle = copyStyle.color;
  ctx.fillText("©", textX + offset, infoY);
  offset += ctx.measureText("©").width + 4;

  ctx.font = `${titreStyle.fontWeight} ${titreStyle.fontSize} ${titreStyle.fontFamily}`;
  ctx.fillStyle = titreStyle.color;
  ctx.fillText("| Dotations", textX + offset, infoY);

  return await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
}

async function getVariantPngBlob(variant, cardElement) {
  const rect = cardElement.getBoundingClientRect();
  const width = Math.max(1, Math.round(rect.width));
  const height = Math.max(1, Math.round(rect.height));
  let finalPng;
  try {
    const clonedCard = cloneWithInlineStyles(cardElement);
    const serializedCard = new XMLSerializer().serializeToString(clonedCard);
    const svgMarkup = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
      <foreignObject x="0" y="0" width="${width}" height="${height}">
        ${serializedCard}
      </foreignObject>
    </svg>`;
    finalPng = await svgToPngBlob(svgMarkup, width, height);
  } catch (_) {
    finalPng = await exportVariantFallbackPng(cardElement, variant, width, height);
  }
  return finalPng;
}

async function exportVariantAsPng(variant, index, cardElement) {
  const finalPng = await getVariantPngBlob(variant, cardElement);
  const safeName = variant.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  const dataUrl = URL.createObjectURL(finalPng);
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = `nextboard-${String(index + 1).padStart(2, "0")}-${safeName}.png`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(dataUrl);
  a.remove();
}

document.fonts.ready.then(() => {
  const titleInput = document.getElementById('dashboard-title-input');
  const wordmarkSelect = document.getElementById('font-wordmark-select');
  const infoSelect = document.getElementById('font-info-select');
  FONT_OPTIONS.forEach((font) => {
    const opt1 = document.createElement('option');
    opt1.value = font.value;
    opt1.textContent = font.label;
    wordmarkSelect.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = font.value;
    opt2.textContent = font.label;
    infoSelect.appendChild(opt2);
  });
  wordmarkSelect.value = SELECTED_WORDMARK_FONT;
  infoSelect.value = SELECTED_INFO_FONT;
  titleInput.value = TITRE;

  function renderGrid() {
    const grid = document.getElementById('demo-grid');
    grid.innerHTML = '';
    const variants = buildVariants();
    variants.forEach((variant, index) => {
    const item = document.createElement('div');
    item.className = 'demo-item';

    const head = document.createElement('div');
    head.className = 'demo-head';

    const label = document.createElement('div');
    label.className = 'demo-label';
    label.textContent = variant.name;

    const exportBtn = document.createElement('button');
    exportBtn.className = 'btn-export';
    exportBtn.type = 'button';
    exportBtn.innerHTML = 'EXPORTER PNG <span class="ico-right" aria-hidden="true"></span>';
    exportBtn.addEventListener('click', async () => {
      exportBtn.disabled = true;
      try {
        await exportVariantAsPng(variant, index, card);
      } catch (e) {
        alert("Export PNG impossible pour cette version.");
      } finally {
        exportBtn.disabled = false;
      }
    });

    const card = document.createElement('div');
    card.className = 'demo-card';
    card.style.background = variant.bg;
    if (variant.textured) {
      const isVeryDark = /23 Graphite|24 Anthracite|25 Noir/.test(variant.name);
      if (isVeryDark) {
        const overlay = 'linear-gradient(rgba(8, 24, 40, 0.12), rgba(8, 24, 40, 0.12))';
        card.style.backgroundColor = variant.bg;
        card.style.backgroundImage = `${overlay}, url('${TECH_BG_URL}')`;
        card.style.backgroundSize = 'cover, cover';
        card.style.backgroundPosition = 'center, center';
        card.style.backgroundRepeat = 'no-repeat, no-repeat';
        card.style.backgroundBlendMode = 'normal, normal';
      } else {
        const overlay = variant.theme === 'dark'
          ? 'linear-gradient(rgba(6, 20, 34, 0.28), rgba(6, 20, 34, 0.28))'
          : 'linear-gradient(rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.18))';
        card.style.backgroundImage = `${overlay}, url('${TECH_BG_URL}'), ${variant.bg}`;
        card.style.backgroundSize = 'cover, cover, cover';
        card.style.backgroundPosition = 'center, center, center';
        card.style.backgroundRepeat = 'no-repeat, no-repeat, no-repeat';
        card.style.backgroundBlendMode = 'normal, overlay, normal';
      }
    }

    const logo = document.createElement('div');
    logo.id = `logo-variant-${index + 1}`;
    logo.innerHTML = nexboardLogo({ titre: TITRE, periode: PERIODE, theme: variant.theme });

    card.appendChild(logo);
    head.appendChild(label);
    head.appendChild(exportBtn);
    item.appendChild(head);
    item.appendChild(card);
    grid.appendChild(item);
    });
  }

  wordmarkSelect.addEventListener('change', () => {
    SELECTED_WORDMARK_FONT = wordmarkSelect.value;
    renderGrid();
  });

  infoSelect.addEventListener('change', () => {
    SELECTED_INFO_FONT = infoSelect.value;
    renderGrid();
  });

  titleInput.addEventListener('input', () => {
    TITRE = (titleInput.value || '').trim() || 'Dotations';
    renderGrid();
  });

  renderGrid();
});
</script>
